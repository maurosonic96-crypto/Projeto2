<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sonic System Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="overlay"></div>

    <header>

        <img src="sonic.gif" class="sonic">

        <h1>SONIC SYSTEM DASHBOARD</h1>

        <p class="subtitle">
            Monitoramento do Sistema Operacional em Tempo Real
        </p>

    </header>

    <main>

        <div class="card cpu">

            <h2>⚡ CPU SPEED</h2>

            <p id="cpu">0%</p>

        </div>

        <div class="card ram">

            <h2>💾 RING MEMORY</h2>

            <p id="ram">0%</p>

        </div>

        <div class="card system">

            <h2>🖥 SYSTEM ZONE</h2>

            <p id="platform">---</p>

        </div>

        <div class="card host">

            <h2>🌎 HOSTNAME</h2>

            <p id="hostname">---</p>

        </div>

        <div class="card node">

            <h2>🚀 NODE ENGINE</h2>

            <p id="node">---</p>

        </div>

        <div class="card cloud">

            <h2>☁ CLOUD STATUS</h2>

            <p id="cloud">---</p>

        </div>

    </main>

    <footer>

        <p>
            Fatec Itapetininga • Sistemas Operacionais • Node.js + Express + Render
        </p>

    </footer>

    <script src="app.js"></script>

</body>
</html>
